version: '3.8'

services:
  db:
    image: postgres:15
    container_name: civicvoice_db
    environment:
      POSTGRES_DB: civicvoice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: civicvoice_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@civicvoice.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
